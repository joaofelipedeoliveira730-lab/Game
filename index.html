<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuantumComm // Porta de Enlace</title>
    <style>
        /* ESTILO FUTURISTA (CYBERPUNK / SCI-FI) */
        :root {
            --neon-cyan: #00f3ff;
            --neon-magenta: #ff0055;
            --dark-bg: #0a0a12;
            --panel-bg: #121225;
            --text-color: #c4c4d4;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Courier New', Courier, monospace;
        }

        body {
            background-color: var(--dark-bg);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* Tela de Login */
        .login-container {
            background: var(--panel-bg);
            border: 2px solid var(--neon-cyan);
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.2);
            padding: 30px;
            border-radius: 8px;
            width: 350px;
            text-align: center;
        }

        h2 {
            color: var(--neon-cyan);
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(0, 243, 255, 0.5);
        }

        .input-group {
            margin-bottom: 15px;
            text-align: left;
        }

        label {
            display: block;
            font-size: 12px;
            color: var(--neon-magenta);
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        input {
            width: 100%;
            padding: 10px;
            background: #05050a;
            border: 1px solid var(--neon-cyan);
            color: #fff;
            border-radius: 4px;
            outline: none;
        }

        input:focus {
            box-shadow: 0 0 10px rgba(0, 243, 255, 0.5);
        }

        button {
            width: 100%;
            padding: 12px;
            background: transparent;
            border: 2px solid var(--neon-magenta);
            color: var(--neon-magenta);
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        button:hover {
            background: var(--neon-magenta);
            color: #fff;
            box-shadow: 0 0 15px rgba(255, 0, 85, 0.6);
        }

        /* Painel do Chat (Oculto inicialmente) */
        .chat-container {
            display: none;
            width: 90vw;
            max-width: 900px;
            height: 85vh;
            background: var(--panel-bg);
            border: 2px solid var(--neon-cyan);
            grid-template-columns: 250px 1fr;
            border-radius: 8px;
            overflow: hidden;
        }

        /* Barra Lateral */
        .sidebar {
            background: #0d0d1f;
            border-right: 2px solid var(--neon-cyan);
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .info-porta {
            border-bottom: 1px solid rgba(0, 243, 255, 0.3);
            padding-bottom: 15px;
            margin-bottom: 15px;
        }

        .info-porta h3 {
            color: var(--neon-cyan);
            font-size: 16px;
        }

        .user-list {
            flex-grow: 1;
            overflow-y: auto;
        }

        .user-item {
            padding: 8px;
            margin-bottom: 5px;
            background: rgba(0, 243, 255, 0.1);
            border-left: 3px solid var(--neon-cyan);
            font-size: 14px;
        }

        /* Área de Mensagens */
        .main-chat {
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .chat-header {
            padding: 15px;
            background: rgba(0, 243, 255, 0.05);
            border-bottom: 1px solid rgba(0, 243, 255, 0.2);
            text-align: center;
            font-weight: bold;
            color: var(--neon-cyan);
        }

        .messages-display {
            flex-grow: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* Balões de Mensagem */
        .msg {
            max-width: 70%;
            padding: 10px 15px;
            border-radius: 6px;
            position: relative;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .msg.sent {
            background: rgba(255, 0, 85, 0.1);
            border: 1px solid var(--neon-magenta);
            align-self: flex-end;
        }

        .msg.received {
            background: rgba(0, 243, 255, 0.1);
            border: 1px solid var(--neon-cyan);
            align-self: flex-start;
        }

        .msg .username {
            font-size: 11px;
            color: var(--neon-cyan);
            margin-bottom: 5px;
            display: block;
        }

        .msg.sent .username {
            color: var(--neon-magenta);
        }

        /* Estilos de mídia dentro do chat */
        .msg img, .msg video {
            max-width: 100%;
            border-radius: 4px;
            margin-top: 5px;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .download-btn {
            display: inline-block;
            margin-top: 8px;
            padding: 5px 10px;
            background: #000;
            border: 1px solid var(--neon-cyan);
            color: var(--neon-cyan);
            text-decoration: none;
            font-size: 12px;
            border-radius: 4px;
        }

        /* Input de envio */
        .chat-input-area {
            padding: 15px;
            border-top: 1px solid rgba(0, 243, 255, 0.2);
            display: flex;
            gap: 10px;
            background: #0a0a14;
        }

        .file-label {
            padding: 10px;
            background: transparent;
            border: 1px dashed var(--neon-cyan);
            color: var(--neon-cyan);
            cursor: pointer;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        #file-input {
            display: none;
        }

        #msg-input {
            flex-grow: 1;
        }
    </style>
</head>
<body>

    <div class="login-container" id="login-screen">
        <h2>Acesso à Rede</h2>
        <div class="input-group">
            <label>Identificação (Nome)</label>
            <input type="text" id="username-input" placeholder="Ex: Cyber_Ghost">
        </div>
        <div class="input-group">
            <label>Código da Porta (Frequência)</label>
            <input type="text" id="room-input" placeholder="Ex: 9942">
        </div>
        <button onclick="conectarRede()">Conectar à Porta</button>
    </div>

    <div class="chat-container" id="chat-screen">
        <div class="sidebar">
            <div class="info-porta">
                <h3>PORTA: <span id="display-porta" style="color: var(--neon-magenta);">0000</span></h3>
                <p style="font-size: 11px; margin-top: 5px;">Usuário: <span id="display-usuario">---</span></p>
            </div>
            <div class="info-porta">
                <h4 style="font-size: 12px; color: var(--neon-cyan); margin-bottom: 10px;">CANAIS DISPONÍVEIS</h4>
                <div class="user-item" style="border-left-color: var(--neon-magenta);"># Grupo Geral da Porta</div>
            </div>
            <div class="user-list">
                <h4 style="font-size: 12px; margin-bottom: 10px;">CONECTADOS</h4>
                <div id="lista-usuarios">
                    </div>
            </div>
            <button onclick="desconectar()" style="padding: 5px; font-size: 12px;">Desconectar</button>
        </div>

        <div class="main-chat">
            <div class="chat-header">
                // TRANSMISSÃO EM TEMPO REAL // P2P SIMULADO
            </div>
            
            <div class="messages-display" id="chat-messages">
                </div>

            <div class="chat-input-area">
                <label class="file-label" title="Anexar Arquivo/Foto/Vídeo">
                    📎
                    <input type="file" id="file-input" onchange="enviarArquivo(this)">
                </label>
                <input type="text" id="msg-input" placeholder="Digite sua transmissão codificada..." onkeypress="verificarTecla(event)">
                <button onclick="enviarMensagemTextual()" style="margin: 0; width: auto; padding: 0 20px;">Enviar</button>
            </div>
        </div>
    </div>

    <script>
        // Variáveis de estado do usuário
        let usuarioAtual = "";
        let portaAtual = "";

        // Função para simular a entrada na rede/porta
        function conectarRede() {
            const nome = document.getElementById('username-input').value.trim();
            const porta = document.getElementById('room-input').value.trim();

            if (!nome || !porta) {
                alert("Por favor, preencha o Nome e o Código da Porta!");
                return;
            }

            usuarioAtual = nome;
            portaAtual = porta;

            // Atualiza dados na tela do chat
            document.getElementById('display-porta').innerText = portaAtual;
            document.getElementById('display-usuario').innerText = usuarioAtual;

            // Transiciona as telas
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('chat-screen').style.display = 'grid';

            // Simula outros usuários entrando na mesma porta para deixar o ambiente vivo
            gerarUsuariosSimulados();

            // Mensagem do sistema
            adicionarMensagemSistema(`Você se conectou à porta criptografada [${portaAtual}].`);
        }

        function desconectar() {
            document.getElementById('chat-messages').innerHTML = '';
            document.getElementById('chat-screen').style.display = 'none';
            document.getElementById('login-screen').style.display = 'block';
        }

        // Envia mensagem de texto normal
        function enviarMensagemTextual() {
            const input = document.getElementById('msg-input');
            const texto = input.value.trim();
            
            if (texto === "") return;

            renderizarMensagem(usuarioAtual, texto, 'sent');
            input.value = "";

            // Simula uma resposta automatica de alguém na mesma porta após 2 segundos
            setTimeout(() => {
                simularRespostaInimiga();
            }, 2000);
        }

        function verificarTecla(e) {
            if (e.key === 'Enter') {
                enviarMensagemTextual();
            }
        }

        // Lida com o envio de arquivos (Fotos, Vídeos, Documentos) sem salvar no servidor
        function enviarArquivo(input) {
            const file = input.files[0];
            if (!file) return;

            // Transforma o arquivo em uma URL temporária do próprio navegador (Blob)
            // Isso garante que o arquivo existe apenas localmente e não em um banco de dados externo
            const urlTemporaria = URL.createObjectURL(file);
            
            renderizarMidia(usuarioAtual, file.name, file.type, urlTemporaria, 'sent');
            
            // Limpa o input de arquivo para permitir novos uploads
            input.value = '';
        }

        // Renderiza textos no chat
        function renderizarMensagem(usuario, texto, tipo) {
            const painel = document.getElementById('chat-messages');
            const msgDiv = document.createElement('div');
            msgDiv.className = `msg ${tipo}`;

            msgDiv.innerHTML = `
                <span class="username">${usuario}</span>
                <p>${texto}</p>
            `;

            painel.appendChild(msgDiv);
            painel.scrollTop = painel.scrollHeight;
        }

        // Renderiza fotos, vídeos e arquivos com a opção de download imediato
        function renderizarMidia(usuario, nomeArquivo, tipoArquivo, url, tipoExibicao) {
            const painel = document.getElementById('chat-messages');
            const msgDiv = document.createElement('div');
            msgDiv.className = `msg ${tipoExibicao}`;

            let conteudoMidia = `<span class="username">${usuario}</span><p style="font-size:12px; color:var(--neon-cyan);">Arquivo recebido: ${nomeArquivo}</p>`;

            // Se for imagem, mostra o preview
            if (tipoArquivo.startsWith('image/')) {
                conteudoMidia += `<img src="${url}" alt="Imagem enviada">`;
            } 
            // Se for vídeo, gera o player
            else if (tipoArquivo.startsWith('video/')) {
                conteudoMidia += `<video controls src="${url}"></video>`;
            }

            // Botão de download (Garante que a pessoa "abaixe" o arquivo diretamente do link de memória)
            conteudoMidia += `<br><a href="${url}" download="${nomeArquivo}" class="download-btn">⬇ Baixar Arquivo</a>`;

            msgDiv.innerHTML = conteudoMidia;
            painel.appendChild(msgDiv);
            painel.scrollTop = painel.scrollHeight;
        }

        function adicionarMensagemSistema(texto) {
            const painel = document.getElementById('chat-messages');
            const aviso = document.createElement('div');
            aviso.style = "text-align: center; font-size: 11px; color: rgba(0, 243, 255, 0.5); margin: 10px 0;";
            aviso.innerText = `// SYS_ALERT: ${texto}`;
            painel.appendChild(aviso);
        }

        // Funções de simulação para o chat não ficar vazio
        function gerarUsuariosSimulados() {
            const lista = document.getElementById('lista-usuarios');
            lista.innerHTML = `
                <div class="user-item">${usuarioAtual} (Você)</div>
                <div class="user-item" style="opacity: 0.7;">Net_Runner_X</div>
                <div class="user-item" style="opacity: 0.7;">Proxy_V</div>
            `;
        }

        function simularRespostaInimiga() {
            const respostas = [
                "Dados recebidos na porta. Conexão está estável.",
                "Alguém interceptando essa frequência? Mudei os pacotes.",
                "Copiado. Limpando rastros da rede agora.",
                "Arquivo descriptografado com sucesso."
            ];
            const respostaAleatoria = respostas[Math.floor(Math.random() * respostas.length)];
            renderizarMensagem("Net_Runner_X", respostaAleatoria, 'received');
        }
    </script>
</body>
</html>
